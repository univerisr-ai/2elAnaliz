name: Telegram GPU JSON Analyzer

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-gpu-analyzer
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run analyzer
        env:
          TELEGRAM_BOT_TOKEN_1: ${{ secrets.TELEGRAM_BOT_TOKEN_1 }}
          TELEGRAM_BOT_TOKEN_2: ${{ secrets.TELEGRAM_BOT_TOKEN_2 }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          TELEGRAM_FORCE_CHAT_ID: ${{ vars.TELEGRAM_FORCE_CHAT_ID }}
          TELEGRAM_POLL_LIMIT: ${{ vars.TELEGRAM_POLL_LIMIT }}
          MIN_DISCOUNT_RATIO: ${{ vars.MIN_DISCOUNT_RATIO }}
          MAX_RESULTS: ${{ vars.MAX_RESULTS }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODELS: ${{ vars.OPENROUTER_MODELS }}
          MAX_AI_FALLBACK_MODELS: ${{ vars.MAX_AI_FALLBACK_MODELS }}
          MAX_AI_MODEL_LOOKUPS: ${{ vars.MAX_AI_MODEL_LOOKUPS }}
          MAX_WEB_MODEL_LOOKUPS: ${{ vars.MAX_WEB_MODEL_LOOKUPS }}
        run: node src/index.mjs

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-analysis-artifacts
          path: |
            data/outbox/
          if-no-files-found: ignore
          retention-days: 14
